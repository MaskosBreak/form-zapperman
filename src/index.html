<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapperman</title>
</head>
<body>
    <main>
        <div class="top">
            <img src="../icon/logo.png" alt="Zapp" width="40px">
            <h1>Empresa</h1>
        </div>
        <div class="msg">
            <p>Olá, insira seus dados para ser direcionado ao WhatsApp:</p>
        </div>
        <div class="inputs">    

            <div class="formulario">

                <label>Seu nome</label>
                <input type="text" id="nome" placeholder="Digite seu nome">

                <label>Seu e-mail</label>
                <input type="email" id="email" placeholder="exemplo@email.com">

                <label>Seu WhatsApp</label>
                <input type="text" id="telefone" placeholder="+55 (99) 99999-9999">

                <button onclick="enviarWhats()">
                    Ir para o WhatsApp
                </button>

        </div>

        <span>Powered by Agendor</span>

    </div>

    <script src="script.js"></script>
 
    </main>
</body>
</html>
